<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Wall</title>

    <style>
        body{
            margin:0;
            background:#111;
            color:white;
            font-family:Arial, sans-serif;
            text-align:center;
        }

        h1{
            margin-top:50px;
        }

        p{
            color:#ccc;

<body>

<h1>📸 Photo Wall</h1>

<p>Välkommen! Här kommer du snart kunna ta bilder och dela dem med alla.</p>

</html>
